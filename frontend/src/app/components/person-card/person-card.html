<mat-card class="person-card">
  <div class="color-bar" [style.background-color]="getColorHex(person.color)"></div>
  <mat-card-header>
    <mat-card-title>{{ person.name }} {{ person.lastname }}</mat-card-title>
    <mat-card-subtitle>{{ person.zipcode }} {{ person.city }}</mat-card-subtitle>
  </mat-card-header>
  <mat-card-content>
    <p>Lieblingsfarbe: <strong>{{ person.color }}</strong></p>
  </mat-card-content>
  <mat-card-actions>
    <button mat-button color="primary" [routerLink]="['/person', person.id]">DETAILS</button>
  </mat-card-actions>
</mat-card>
